version: "3.9"

services:
  sbomit-server:
    build: .
    container_name: sbomit-generator-server
    ports:
      - "5000:5000"
    environment:
      - APTOKEN=${APTOKEN:-sbomit-dev-token}
      - PORT=5000
      - STORAGE_DIR=/app/attestation_store
    volumes:
      # Attestations persist across container restarts
      - attestation_store:/app/attestation_store
    restart: unless-stopped

volumes:
  attestation_store:
